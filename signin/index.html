<html lang="en">

<head>
    <title>PrimePudu</title>
    <meta name="keywords" content="Math, Free, Pudu, Prime, PrimePudu, Primes, Pudus, Learn, Friendly, Fun, Learning">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
</head>

<body class="signinTab">
    <div id="mainGridDiv">
        <a href="../">
            <img src="../images/primepudu.png" width="300px" style="place-self: center;">
        </a>
        <p>Sign In to PrimePudu</p>
        <form id="signInForm" style="text-align: left;">
            <label for="username">Username</label><br>
            <input id="username" type="text"><br>
            <label for="password">Password</label><br>
            <input id="password" type="password"><br><br>
            <p id="errorText" style="color: red; margin-bottom: 10px; display: none;">Error</p>
            <button type="submit" style="width: 100%;">Submit</button>
        </form>
        <a href="../create_account" style="font-size: 15px; color: var(--gray1)">Create an account</a>
    </div>
    <script>
        const form = document.getElementById("signInForm");

        async function sha256(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest("SHA-256", data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
        }

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            const usernameInput = document.getElementById("username").value;
            const passwordInput = document.getElementById("password").value;
            const hashedUsername = await sha256(usernameInput);
            const hashedPassword = await sha256(passwordInput);

            const errorText = document.getElementById("errorText");

            let account;
            async function getAccount(accountId) {
                try {
                    const response = await fetch(`/get-account/${accountId}`);
                    if (!response.ok) throw new Error('Account not found');
                    const data = await response.json();
                    // Example: Accessing the progress you just modified
                    account = data;
                    return data; // Return the data so await works properly
                } catch (error) {
                    account = false;
                    console.error('Error:', error);
                }
            }

            await getAccount(hashedUsername);

            console.log(account)
            if (account) {
                if (account.password == hashedPassword) {
                    localStorage.setItem("username", usernameInput);
                    localStorage.setItem("password", passwordInput);
                    localStorage.setItem("hashName", hashedUsername);

                    window.location.href = localStorage.getItem("previousUrl") || "..";
                } else {
                    errorText.style.display = "block";
                    errorText.textContent = "Error: Password incorrect"
                }
            } else {
                errorText.style.display = "block";
                errorText.textContent = "Error: User doesn't exist";
            }
        })
    </script>
</body>

</html>
