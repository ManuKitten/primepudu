<html lang="en">
    <head>
        <title>PrimePudu | Lesson</title>
        <meta name="keywords" content="Math, Free, Pudu, Prime, PrimePudu, Primes, Pudus, Learn, Friendly, Fun, Learning">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../style.css">
        <link rel="manifest" href="/manifest.json">
        <meta name="theme-color" content="#2b76e0">
    </head>
    <body class="lessonBody">
        <div id="contentDiv">
            <div id="lessonElements">
                <div id="upperbar">
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                    <div class="progressUnit"></div>
                </div>
                <div id="information"></div>
                <form id="instantLessonForm">
                    <textarea id="formTextarea"></textarea>
                </form>
                <button id="checkbutton">Check</button>
            </div>
            <div id="lessonCompleted">
                <h1>Lesson Completed!</h1>
                <p>Well Done!</p>
                <button id="continueButton">Continue</button>
            </div>
        </div>
        <script src="../master.js"></script>
        <script type="module">
            orderHeader(1);

            function updateStreak(newStreak) {
                const targetAccountId = localStorage.getItem("hashName");

                fetch('/update-streak', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        accountId: targetAccountId,
                        newStreak: newStreak,
                    }),
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Success:', data);
                    window.location.href = "../learnway"; // Redirect after success
                })
                .catch((error) => {
                    console.error('Error:', error);
                });
            }

            function upgradeLessonsAndGo(newSectionData) {
                const targetAccountId = localStorage.getItem("hashName");

                fetch('/upgrade-lessons', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        accountId: targetAccountId,
                        sectionName: newSectionData[0],
                        lessonIndex: newSectionData[1]
                    }),
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Success:', data);
                })
                .catch((error) => {
                    console.error('Error:', error);
                });
            }

            let account;
            async function loadUserProgress(accountId) {
                try {
                    const response = await fetch(`/get-account/${accountId}`);
                    if (!response.ok) throw new Error('Account not found');
                    const data = await response.json();
                    // Example: Accessing the progress you just modified
                    account = data;
                    return data; // Return the data so await works properly
                } catch (error) {
                    console.error('Error:', error);
                    throw error; // Re-throw so calling code knows it failed
                }
            }
            await loadUserProgress(localStorage.getItem("hashName"));

            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            const quizValue = urlParams.get('quiz').slice(7, 11);

            if (quizValue == null) {
                window.location.href = "../learnway"
            }

            const upperbar = document.getElementById("upperbar")
            const information = document.getElementById("information");
            const instantLessonForm = document.getElementById("instantLessonForm");
            const textarea = document.getElementById("formTextarea");
            const checkbutton = document.getElementById("checkbutton");
            let clickableCheckbutton = true;

            let question = 0;

            fetch("quizzes.json").then(response => response.json()).then(quizzes => {
                const quiz = quizzes["quizset" + quizValue]

                function translate(element) {
                    switch (element) {
                        case "write":
                            return "textarea";
                            break;
                    }
                }

                function showOnly(tag) {
                    for (let i = 0; i < instantLessonForm.children.length; i++) {
                        const child = instantLessonForm.children[i];
                        if (child.tagName.toLowerCase() != tag) {
                            child.style.display = "none";
                        }
                    }
                }

                // Get the Section Name of the Lessons Section
                async function getSNLesson(quizName) {
                    const response = await fetch("../learnway/sections.json");
                    const sections = await response.json();
                    
                    for (const sectionName of Object.keys(sections)) {
                        const sectionQuizzes = sections[sectionName].quizzes;
                        console.log(sectionQuizzes);
                        console.log(quizName);
                        
                        if (sectionQuizzes[0]?.includes(quizName)) {
                            return [sectionName, 0];
                        } else if (sectionQuizzes[1]?.includes(quizName)) {
                            return [sectionName, 1];
                        } else if (sectionQuizzes[2]?.includes(quizName)) {
                            return [sectionName, 2];
                        } else if (sectionQuizzes[3]?.includes(quizName)) {
                            return [sectionName, 3];
                        }
                    }
                    
                    return null;
                }

                information.innerHTML = quiz[question][0];
                MathJax.typesetPromise([information]);
                showOnly(translate(quiz[question][1]));

                checkbutton.addEventListener("click", function(){
                    if (!clickableCheckbutton) return;
                    if (quiz[question][2].replace(/ /g, '') == textarea.value.replace(/ /g, '')) {
                        clickableCheckbutton = false;
                        checkbutton.style.backgroundColor = "33cc33";
                        checkbutton.textContent = "Correct";
                        setTimeout(function(){
                            information.style.opacity = "0";
                            instantLessonForm.style.opacity = "0";

                            setTimeout(function(){
                                upperbar.children[question].style.backgroundColor = "var(--blue1)";
                                question++;
                                
                                if (question < 10) {
                                    information.innerHTML = quiz[question][0]
                                    MathJax.typesetPromise([information]);
                                    showOnly(translate(quiz[question][1]))
                                    instantLessonForm.getElementsByTagName(translate(quiz[question][1]))[0].value = "";

                                    setTimeout(function(){                            
                                        information.style.opacity = "1";
                                        instantLessonForm.style.opacity = "1";
                                        checkbutton.style.backgroundColor = "var(--blue1)";
                                        checkbutton.textContent = "Check";
                                        clickableCheckbutton = true;
                                    }, 300);
                                } else {
                                    document.getElementById("lessonElements").style.opacity = "0";
                                    getSNLesson("quizset" + quizValue).then(value => {
                                        //console.log(value)
                                        document.getElementById("continueButton").onclick = async () => {
                                            await upgradeLessonsAndGo(value);
                                            let streak = getRealStreakString(account.streak, account.creationDate)
                                            streak = streak.slice(0, streak.length - 1) + "1"; 
                                            updateStreak(streak);
                                        };
                                    })
                                    setTimeout(function(){
                                        document.getElementById("lessonElements").style.display = "none";
                                        document.getElementById("lessonCompleted").style.display = "grid";
                                        document.getElementById("lessonCompleted").style.opacity = "1";
                                    }, 300)
                                }
                            }, 300)
                        }, 300)
                                                
                    } else {
                        checkbutton.style.backgroundColor = "cc3333";
                        checkbutton.textContent = "Try again";
                        setTimeout(function(){
                            checkbutton.style.backgroundColor = "var(--blue1)";
                            checkbutton.textContent = "Check";
                        }, 700);
                        
                    }
                })
            })
        </script>
    </body>
</html>
