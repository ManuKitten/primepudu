<html lang="en">

<head>
    <title>PrimePudu | Learn</title>
    <meta name="keywords" content="Math, Free, Pudu, Prime, PrimePudu, Primes, Pudus, Learn, Friendly, Fun, Learning">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2b76e0">
</head>

<body class="learnTab">
    <div id="mainContentDiv"></div>
    <script src="../master.js"></script>
    <script>
        orderHeader(1);
        document.getElementsByTagName("header")[0].style.position = "sticky";
        document.getElementsByTagName("header")[0].style.top = "0";
        document.getElementsByTagName("header")[0].style.backgroundColor = "var(--white2)";

        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const lessonValue = urlParams.get('lesson');

        fetch("lessons.json").then(response => response.json()).then(async lessons => {
            document.getElementsByTagName("title")[0].innerHTML = "PrimePudu | " + lessons[lessonValue].name;
            document.getElementById("mainContentDiv").innerHTML = lessons[lessonValue].content;
            const expressions = document.getElementsByTagName("expression");
            for (let i = 0; i < expressions.length; i++) {
                const element = expressions[i];
                element.innerHTML = "$$" + element.innerHTML + "$$";
            }
            await MathJax.typesetPromise([document.getElementById("mainContentDiv")]);
            for (let i = 0; i < expressions.length; i++) {
                const element = expressions[i];
                element.children[0].style.margin = "7px";
            }
        })
    </script>
</body>

</html>
